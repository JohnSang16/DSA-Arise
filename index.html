<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DSA Cyber-Dungeon</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    :root { --cyan:#00e5ff; --green:#00ff88; --red:#ff2244; --bg:#05080f; --surface:#0a0d1a; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); font-family:'Share Tech Mono',monospace; }

    /* Scanlines */
    body::after { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px); pointer-events:none; z-index:9999; }

    /* Grid bg */
    .grid-bg { background-color:var(--bg); background-image:linear-gradient(rgba(0,229,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.04) 1px,transparent 1px); background-size:48px 48px; }

    /* Glitch */
    @keyframes glitch-1 { 0%,89%,100%{clip-path:inset(0 0 100% 0);transform:translate(0);} 90%{clip-path:inset(10% 0 70% 0);transform:translate(-3px,0);} 92%{clip-path:inset(50% 0 30% 0);transform:translate(3px,0);} 94%{clip-path:inset(80% 0 8% 0);transform:translate(-2px,0);} 96%{clip-path:inset(25% 0 60% 0);transform:translate(2px,0);} }
    @keyframes glitch-2 { 0%,91%,100%{clip-path:inset(0 0 100% 0);transform:translate(0);} 92%{clip-path:inset(60% 0 20% 0);transform:translate(3px,0);} 94%{clip-path:inset(20% 0 65% 0);transform:translate(-3px,0);} 96%{clip-path:inset(85% 0 5% 0);transform:translate(1px,0);} }
    .glitch-wrap { position:relative; display:inline-block; }
    .glitch-wrap::before { content:attr(data-text); position:absolute; inset:0; color:#ff2244; animation:glitch-1 4s infinite; opacity:0.75; }
    .glitch-wrap::after  { content:attr(data-text); position:absolute; inset:0; color:#00ff88; animation:glitch-2 4s infinite 0.15s; opacity:0.75; }

    /* Buttons */
    .btn { font-family:'Orbitron',monospace; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; border:2px solid; padding:13px 40px; cursor:pointer; background:transparent; font-size:13px; transition:transform 0.15s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.2s ease,background 0.2s ease; }
    .btn:active { transform:scale(0.97) !important; }
    .btn-green { color:#00ff88; border-color:#00ff88; box-shadow:0 0 12px rgba(0,255,136,0.25),inset 0 0 8px rgba(0,255,136,0.04); }
    .btn-green:hover { transform:translateY(-3px); box-shadow:0 0 24px rgba(0,255,136,0.6),0 0 48px rgba(0,255,136,0.2),inset 0 0 16px rgba(0,255,136,0.12); background:rgba(0,255,136,0.07); }
    .btn-cyan  { color:#00e5ff; border-color:#00e5ff; box-shadow:0 0 12px rgba(0,229,255,0.25),inset 0 0 8px rgba(0,229,255,0.04); }
    .btn-cyan:hover  { transform:translateY(-3px); box-shadow:0 0 24px rgba(0,229,255,0.6),0 0 48px rgba(0,229,255,0.2),inset 0 0 16px rgba(0,229,255,0.12); background:rgba(0,229,255,0.07); }
    .btn-disabled { color:#2a2a3a; border-color:#1e1e2e; cursor:not-allowed; opacity:0.45; box-shadow:none; }

    /* Zone cards */
    .zone-card { background:var(--surface); border:1px solid; border-radius:3px; padding:18px; cursor:pointer; position:relative; overflow:hidden; transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.2s ease; min-height:188px; display:flex; flex-direction:column; justify-content:space-between; }
    .zone-card::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,0.025) 0%,transparent 55%); pointer-events:none; }
    .zone-card:not(.locked):hover { transform:translateY(-5px) scale(1.02); }
    .zone-card.locked { cursor:not-allowed; filter:saturate(0.2) brightness(0.5); }

    @keyframes corrupt { 0%,92%,100%{transform:none;} 93%{transform:translateX(3px);clip-path:inset(15% 0 55% 0);} 94%{transform:translateX(-2px);clip-path:none;} 95%{transform:none;clip-path:inset(70% 0 10% 0);} 96%{transform:none;clip-path:none;} }
    .corrupted { animation:corrupt 6s infinite; }
    @keyframes spin-slow { to{transform:rotate(360deg);} }
    .spin-slow { animation:spin-slow 25s linear infinite; }
    @keyframes flicker { 0%,96%,100%{opacity:1;} 97%{opacity:0.5;} 98%{opacity:1;} 99%{opacity:0.3;} }
    .flicker { animation:flicker 5s infinite; }
    @keyframes float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
    .float { animation:float 4s ease-in-out infinite; }

    .corner { position:absolute; width:14px; height:14px; border-color:#00e5ff; border-style:solid; border-width:0; opacity:0.5; }
    .corner-tl { top:7px; left:7px; border-top-width:2px; border-left-width:2px; }
    .corner-tr { top:7px; right:7px; border-top-width:2px; border-right-width:2px; }
    .corner-bl { bottom:7px; left:7px; border-bottom-width:2px; border-left-width:2px; }
    .corner-br { bottom:7px; right:7px; border-bottom-width:2px; border-right-width:2px; }

    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-track { background:#05080f; }
    ::-webkit-scrollbar-thumb { background:rgba(0,229,255,0.25); border-radius:3px; }
    #particle-canvas { position:fixed; inset:0; pointer-events:none; z-index:0; }

    /* ─── Level Screen ─── */

    /* Data core states */
    .core-idle   { transform: translate(295px, 118px); }
    .core-placed { transform: translate(345px, 168px); }

    @keyframes core-to-cell1 {
      0%   { transform: translate(293px, 78px); }
      35%  { transform: translate(315px, 42px); }
      100% { transform: translate(345px, 168px); }
    }
    .core-moving { animation: core-to-cell1 0.85s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }

    /* Core float idle */
    @keyframes core-float {
      0%,100% { transform: translate(293px, 78px); }
      50%     { transform: translate(293px, 71px); }
    }
    .core-floating { animation: core-float 2.5s ease-in-out infinite; }

    /* Target cell pulse */
    @keyframes target-pulse {
      0%,100% { opacity: 0.7; }
      50%     { opacity: 1; filter: drop-shadow(0 0 6px #00e5ff); }
    }
    .target-pulse { animation: target-pulse 1.8s ease-in-out infinite; }

    /* Error shake */
    @keyframes shake { 0%,100%{transform:translateX(0);} 20%{transform:translateX(-6px);} 40%{transform:translateX(6px);} 60%{transform:translateX(-5px);} 80%{transform:translateX(4px);} }
    .input-shake { animation: shake 0.4s ease; }

    /* Victory popup */
    @keyframes victory-in { 0%{transform:scale(0.4) translateY(40px);opacity:0;} 65%{transform:scale(1.07) translateY(-8px);opacity:1;} 100%{transform:scale(1) translateY(0);opacity:1;} }
    .victory-popup { animation: victory-in 0.55s cubic-bezier(0.34,1.56,0.64,1) forwards; }

    /* HP gain */
    @keyframes hp-gain { 0%,100%{filter:brightness(1);} 50%{filter:brightness(2) drop-shadow(0 0 8px #00ff88);} }
    .hp-gain { animation: hp-gain 0.5s ease 1s; }

    /* Execute button */
    .exec-btn { width:100%; font-family:'Orbitron',monospace; font-weight:700; font-size:13px; letter-spacing:0.2em; text-transform:uppercase; border:2px solid #00ff88; color:#00ff88; background:rgba(0,255,136,0.06); padding:13px; cursor:pointer; transition:transform 0.15s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.2s,background 0.2s; box-shadow:0 0 12px rgba(0,255,136,0.2); }
    .exec-btn:hover { transform:translateY(-2px); box-shadow:0 0 24px rgba(0,255,136,0.5),0 0 48px rgba(0,255,136,0.15); background:rgba(0,255,136,0.12); }
    .exec-btn:active { transform:scale(0.97); }
    .exec-btn:disabled { color:#334; border-color:#334; cursor:not-allowed; box-shadow:none; background:transparent; transform:none; }

    .code-ghost { color:rgba(0,229,255,0.35); }
    .code-var   { color:#00e5ff; }
    .code-fn    { color:#00ff88; }
    .code-op    { color:#ff9900; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

// ─── Zone data ─────────────────────────────────────────────────────────────
const ZONES = [
  { id:1, name:"Array Plains",     topic:"Arrays",       sub:"Memory indexing & traversal",        diff:1, color:"#00ff88", glyph:"[ ]", levels:6  },
  { id:2, name:"Stack Spire",      topic:"Stacks",       sub:"LIFO push/pop mechanics",            diff:2, color:"#00e5ff", glyph:"⊤",   levels:6  },
  { id:3, name:"Queue Keep",       topic:"Queues",       sub:"FIFO enqueue & dequeue",             diff:3, color:"#0099ff", glyph:"⇒",   levels:6  },
  { id:4, name:"Linked Labyrinth", topic:"Linked Lists", sub:"Pointer chains & traversal",        diff:4, color:"#ddcc00", glyph:"→",   levels:8  },
  { id:5, name:"Hash Highlands",   topic:"Hash Tables",  sub:"Hashing & collision resolution",    diff:5, color:"#ff9900", glyph:"#",   levels:7  },
  { id:6, name:"Binary Bastion",   topic:"Binary Trees", sub:"BST insert, search & rotate",       diff:6, color:"#ff5500", glyph:"⋀",   levels:9  },
  { id:7, name:"Heap Haven",       topic:"Heaps",        sub:"Priority queues & heapify",         diff:7, color:"#ff2200", glyph:"△",   levels:6  },
  { id:8, name:"Graph Graveyard",  topic:"Graphs",       sub:"BFS, DFS & corrupted pathfinding",  diff:8, color:"#ff0033", glyph:"⬡",   levels:10 },
];
const DIFF_LABELS = ["","INITIATE","INITIATE","APPRENTICE","APPRENTICE","ADEPT","ADEPT","CORRUPTED","CORRUPTED"];

// ─── Zone 1 Level Definitions ──────────────────────────────────────────────
// Answers are intentionally non-sequential: 1, 4, 2, 5, 3, 0
const ZONE1_LEVELS = [
  {
    num:1, title:"Memory Relocation",
    hook:"The Frag.Core must be moved to stabilize the array.",
    narrative:"The Fragmented Core sits at index [0] but the repair socket is at index [1]. Copy it to the correct slot to begin the restoration sequence.",
    memLabels:["⚠ Frag.Core","[ socket ]","null","null","null","null"],
    codePrefix:"memory[", codeBlank:true, codeSuffix:"] = memory[0];",
    answer:"1", hpReward:10, isBoss:false,
  },
  {
    num:2, title:"Slime Strike",
    hook:"A DataSlime has nested deep in your array — not where you'd expect.",
    narrative:"Your scanner reveals the DataSlime is hiding at index [4], not the start. Strikes on the wrong index will miss. Target precisely.",
    memLabels:["clear","clear","clear","clear","⚠ DataSlime","null"],
    codePrefix:"array[", codeBlank:true, codeSuffix:"].defeat();",
    answer:"4", hpReward:10, isBoss:false,
  },
  {
    num:3, title:"Vault Protocol",
    hook:"The vault demands the key stored at the ONLY prime index.",
    narrative:"In a 6-slot array (indices 0–5), the prime indices are [2] and [3] and [5]. The vault signature matches the SMALLEST prime index. Insert that key.",
    memLabels:["key_0","key_1","⚑ KEY_2","key_3","key_4","key_5"],
    codePrefix:"vault.open(keys[", codeBlank:true, codeSuffix:"]);",
    answer:"2", hpReward:10, isBoss:false,
  },
  {
    num:4, title:"Final Cache",
    hook:"Your ally cached a weapon at the LAST valid address.",
    narrative:"A 6-element array has indices [0] through [5]. Your ally stored emergency gear at the highest index. Retrieve it before the sector collapses.",
    memLabels:["null","null","null","null","null","⚔ Cache"],
    codePrefix:"hero.equip(stash[", codeBlank:true, codeSuffix:"]);",
    answer:"5", hpReward:10, isBoss:false,
  },
  {
    num:5, title:"Corruption Sweep",
    hook:"A single corrupted sector is spreading — you must find it fast.",
    narrative:"The diagnostic log shows clean data at [0],[1],[2] and [4],[5] but flags an anomaly at index [3]. Isolate and purge only that address.",
    memLabels:["clean","clean","clean","CORRUPT ⚠","clean","clean"],
    codePrefix:"if (sector[", codeBlank:true, codeSuffix:"].status === 'CORRUPT') purge();",
    answer:"3", hpReward:10, isBoss:false,
  },
  {
    num:6, title:"The Null Sentinel",
    hook:"BOSS — The Null Sentinel has manifested. Its core is shielded everywhere but one point.",
    narrative:"Shields block indices [1]–[5]. The Sentinel left index [0] — the array origin — unguarded. Strike the very first memory address to collapse it.",
    memLabels:["⚠ CORE","shield","shield","shield","shield","shield"],
    codePrefix:"sentinel.smite(nexus[", codeBlank:true, codeSuffix:"]);",
    answer:"0", hpReward:20, isBoss:true,
  },
];

// ─── Particles ─────────────────────────────────────────────────────────────
function ParticleCanvas() {
  const ref = useRef(null);
  useEffect(() => {
    const c = ref.current, ctx = c.getContext('2d');
    const resize = () => { c.width = innerWidth; c.height = innerHeight; };
    resize(); window.addEventListener('resize', resize);
    const pts = Array.from({length:55},()=>({x:Math.random()*innerWidth,y:Math.random()*innerHeight,vx:(Math.random()-0.5)*0.35,vy:(Math.random()-0.5)*0.35,r:Math.random()*1.4+0.4,a:Math.random()*0.45+0.1}));
    let raf;
    const draw = () => {
      ctx.clearRect(0,0,c.width,c.height);
      pts.forEach(p=>{p.x=(p.x+p.vx+c.width)%c.width;p.y=(p.y+p.vy+c.height)%c.height;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(0,229,255,${p.a})`;ctx.fill();});
      pts.forEach((a,i)=>pts.slice(i+1).forEach(b=>{const d=Math.hypot(a.x-b.x,a.y-b.y);if(d<110){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle=`rgba(0,229,255,${(1-d/110)*0.07})`;ctx.lineWidth=0.5;ctx.stroke();}}));
      raf=requestAnimationFrame(draw);
    };
    draw();
    return ()=>{cancelAnimationFrame(raf);window.removeEventListener('resize',resize);};
  },[]);
  return <canvas ref={ref} id="particle-canvas"/>;
}

// ─── Start Screen ──────────────────────────────────────────────────────────
function StartScreen({ hasSave, onNewGame, onContinue }) {
  return (
    <div className="grid-bg" style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',position:'relative',overflow:'hidden'}}>
      <ParticleCanvas/>
      <div style={{position:'absolute',top:0,left:0,right:0,padding:'10px 24px',borderBottom:'1px solid rgba(0,229,255,0.12)',display:'flex',justifyContent:'space-between',fontSize:10,color:'rgba(0,229,255,0.4)',letterSpacing:'0.12em',zIndex:10}}>
        <span className="flicker">SYS://DSA-CYBER-DUNGEON/v2.0</span>
        <span>RUNTIME: <span style={{color:'#00ff88'}}>ACTIVE</span></span>
        <span className="flicker">NODE: 0xA3F72C</span>
      </div>
      <div style={{position:'relative',zIndex:10,textAlign:'center',padding:'0 24px'}}>
        <div style={{color:'rgba(0,229,255,0.55)',fontSize:11,letterSpacing:'0.5em',marginBottom:28}}>◈ &nbsp;DIGITAL REALM INTERFACE&nbsp; ◈</div>
        <div style={{marginBottom:10}}>
          <span className="glitch-wrap" data-text="CYBER DUNGEON" style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:'clamp(40px,9vw,88px)',color:'#00e5ff',lineHeight:1,letterSpacing:'-0.02em',textShadow:'0 0 20px rgba(0,229,255,0.9),0 0 60px rgba(0,229,255,0.45),0 0 120px rgba(0,229,255,0.2)',display:'inline-block'}}>CYBER DUNGEON</span>
        </div>
        <div style={{fontFamily:"'Orbitron',monospace",fontWeight:400,fontSize:'clamp(12px,2.5vw,20px)',color:'#00ff88',letterSpacing:'0.35em',textShadow:'0 0 14px rgba(0,255,136,0.7)',marginBottom:14}}>DSA MASTERY PROTOCOL</div>
        <div style={{color:'rgba(0,229,255,0.3)',fontSize:11,letterSpacing:'0.2em',marginBottom:60}}>FRAGMENT THE LOOP LORD — RESTORE THE DATA REALMS</div>
        <div style={{display:'flex',gap:20,justifyContent:'center',flexWrap:'wrap'}}>
          <button className="btn btn-green" onClick={onNewGame}>▶ &nbsp;New Game</button>
          <button className={`btn ${hasSave?'btn-cyan':'btn-disabled'}`} onClick={hasSave?onContinue:undefined} disabled={!hasSave}>⟳ &nbsp;Continue</button>
        </div>
        <div style={{marginTop:14,fontSize:10,letterSpacing:'0.15em'}}>
          {hasSave?<span style={{color:'rgba(0,229,255,0.45)'}}>SAVE FILE DETECTED — RESUME AVAILABLE</span>:<span style={{color:'rgba(255,34,68,0.35)'}}>NO SAVE FILE FOUND</span>}
        </div>
      </div>
      <div className="spin-slow" style={{position:'absolute',bottom:'8%',right:'4%',width:130,height:130,border:'1px solid rgba(0,229,255,0.07)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:52,color:'rgba(0,229,255,0.06)',pointerEvents:'none'}}>⬡</div>
      <div className="spin-slow" style={{position:'absolute',top:'14%',left:'4%',width:90,height:90,border:'1px solid rgba(0,255,136,0.06)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:36,color:'rgba(0,255,136,0.05)',pointerEvents:'none',animationDirection:'reverse'}}>[ ]</div>
      <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'10px 24px',borderTop:'1px solid rgba(0,229,255,0.1)',textAlign:'center',fontSize:10,color:'rgba(0,229,255,0.2)',letterSpacing:'0.2em',zIndex:10}}>◈ PRESS NEW GAME TO INITIALIZE TRAINING SEQUENCE ◈</div>
    </div>
  );
}

// ─── Zone Card / Modal ─────────────────────────────────────────────────────
// ─── Level Select Screen (Zone 1) ──────────────────────────────────────────
function LevelSelectScreen({ saveData, onLevelSelect, onBack }) {
  const completedLevel = (saveData?.level ?? 1) - 1;
  return (
    <div className="grid-bg" style={{minHeight:'100vh'}}>
      {/* Header */}
      <div style={{position:'sticky',top:0,zIndex:20,background:'rgba(5,8,15,0.93)',backdropFilter:'blur(12px)',borderBottom:'1px solid rgba(0,255,136,0.2)',padding:'13px 28px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <button onClick={onBack} style={{background:'transparent',border:'1px solid rgba(0,229,255,0.25)',color:'rgba(0,229,255,0.6)',fontFamily:"'Share Tech Mono',monospace",fontSize:11,padding:'6px 16px',cursor:'pointer',letterSpacing:'0.1em',transition:'all 0.15s'}}
          onMouseOver={e=>{e.currentTarget.style.color='#00e5ff';e.currentTarget.style.borderColor='rgba(0,229,255,0.6)';}}
          onMouseOut={e=>{e.currentTarget.style.color='rgba(0,229,255,0.6)';e.currentTarget.style.borderColor='rgba(0,229,255,0.25)';}}>
          ← WORLD MAP
        </button>
        <div style={{textAlign:'center'}}>
          <div style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:20,color:'#00ff88',letterSpacing:'0.2em',textShadow:'0 0 14px rgba(0,255,136,0.6)'}}>ARRAY PLAINS</div>
          <div style={{fontSize:11,color:'rgba(0,255,136,0.4)',letterSpacing:'0.2em',marginTop:3}}>SELECT LEVEL · ZONE 01</div>
        </div>
        <div style={{fontFamily:"'Orbitron',monospace",fontSize:12,color:'#00ff88'}}>
          {saveData ? `${completedLevel}/6 CLEARED` : '0/6 CLEARED'}
        </div>
      </div>

      {/* Level grid */}
      <div style={{padding:'48px 32px',maxWidth:900,margin:'0 auto'}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:20}}>
          {ZONE1_LEVELS.map((lv,i) => {
            const done   = i < completedLevel;
            const active = i === completedLevel;
            const locked = i > completedLevel;
            const c = lv.isBoss ? '#ff2244' : '#00ff88';
            return (
              <div key={lv.num}
                onClick={locked ? undefined : ()=>onLevelSelect(lv)}
                style={{
                  background: done ? 'rgba(0,255,136,0.06)' : '#0a0d1a',
                  border:`1px solid ${done?'#00ff88'+'44': active?c+'66':'#151525'}`,
                  borderRadius:4, padding:'22px 20px', cursor:locked?'not-allowed':'pointer', position:'relative',
                  boxShadow: active ? `0 0 20px ${c}33,0 0 40px ${c}11` : done ? '0 0 8px rgba(0,255,136,0.1)' : 'none',
                  filter: locked ? 'saturate(0.15) brightness(0.5)' : 'none',
                  transition:'transform 0.2s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.2s',
                }}
                onMouseOver={e=>{if(!locked){e.currentTarget.style.transform='translateY(-4px)';e.currentTarget.style.boxShadow=`0 0 28px ${c}44,0 0 56px ${c}1a`;}}}
                onMouseOut={e=>{if(!locked){e.currentTarget.style.transform='none';e.currentTarget.style.boxShadow=active?`0 0 20px ${c}33,0 0 40px ${c}11`:done?'0 0 8px rgba(0,255,136,0.1)':'none';}}}>
                <div className="corner corner-tl" style={{borderColor:done?'#00ff88':c}}/><div className="corner corner-br" style={{borderColor:done?'#00ff88':c}}/>
                {active && <div style={{position:'absolute',top:0,left:0,right:0,textAlign:'center',background:c,color:'#000',fontSize:9,fontFamily:"'Orbitron',monospace",fontWeight:700,padding:'3px 0',letterSpacing:'0.15em'}}>▶ CURRENT</div>}
                <div style={{paddingTop: active ? 16 : 0}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                    <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:11,color:done?'#00ff88':active?c:'#252535',letterSpacing:'0.1em'}}>
                      {done ? '✓ CLEARED' : active ? '▶ ACTIVE' : `LVL ${lv.num}`}
                    </div>
                    {lv.isBoss && <div style={{fontSize:9,color:'#ff2244',border:'1px solid #ff2244',padding:'1px 6px',fontFamily:"'Orbitron',monospace",letterSpacing:'0.1em'}}>BOSS</div>}
                  </div>
                  <div style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:15,color:done?'rgba(0,255,136,0.7)':active?c:'#252535',marginBottom:6,letterSpacing:'0.03em'}}>{lv.title}</div>

// 2×3 grid: row=0 (back row), row=1 (front row), col=0,1,2
const ISO = { ox:270, oy:140, sx:80, sy:46, hw:80, hh:46, depth:30 };
const GRID_DEF = [
  {idx:0,row:0,col:0},{idx:1,row:0,col:1},{idx:2,row:0,col:2},
  {idx:3,row:1,col:0},{idx:4,row:1,col:1},{idx:5,row:1,col:2},
];
const PAINT_ORDER = [0, 3, 1, 4, 2, 5]; // back-to-front
function isoXY(row,col) {
  return { cx: ISO.ox+(col-row)*ISO.sx, cy: ISO.oy+(col+row)*ISO.sy };
}

// ─── SVG: Isometric Tile (cyber-block) ────────────────────────────────────
function SvgIsoTile({ index, isActive, isTarget, isDone }) {
  const {hw,hh,depth}=ISO;
  const stroke = isDone  ? '#00ff88' : '#00e5ff';
  const topFill= '#040e1c';
  const leftFill='#020a12'; const rightFill='#010710';
  const sw = isTarget||isDone ? 2 : 1.5;
  const glowOpacity = isTarget ? 0.06 : 0.02;

  // Top face verts (centred at 0,0): (-hw,0),(0,-hh),(hw,0),(0,hh)
  const top  = `${-hw},0 0,${-hh} ${hw},0 0,${hh}`;
  const left = `${-hw},0 0,${hh} 0,${hh+depth} ${-hw},${depth}`;
  const right= `0,${hh} ${hw},0 ${hw},${depth} 0,${hh+depth}`;

  return (
    <g>
      {/* Side faces */}
      <polygon points={left}  fill={leftFill}  stroke={stroke} strokeWidth="0.6" opacity="0.85"/>
      <polygon points={right} fill={rightFill} stroke={stroke} strokeWidth="0.6" opacity="0.85"/>
      {/* Top face */}
      <polygon points={top} fill={topFill} stroke={stroke} strokeWidth={sw}/>
      {/* Glow fill */}
      <polygon points={top} fill={stroke} opacity={glowOpacity}/>
      {/* Inner grid lines on top */}
      <polygon points={`${-hw*0.55},0 0,${-hh*0.55} ${hw*0.55},0 0,${hh*0.55}`} fill="none" stroke={stroke} strokeWidth="0.5" opacity="0.2"/>
      {/* Corner dots */}
      <circle cx={-hw*0.88} cy={0}   r="2" fill={stroke} opacity={isActive||isTarget?0.6:0.2}/>
      <circle cx={ hw*0.88} cy={0}   r="2" fill={stroke} opacity={isActive||isTarget?0.6:0.2}/>
      <circle cx={0} cy={-hh*0.88}   r="2" fill={stroke} opacity={isActive||isTarget?0.6:0.2}/>
      <circle cx={0} cy={ hh*0.88}   r="2" fill={stroke} opacity={isActive||isTarget?0.6:0.2}/>
      {/* Side edge accent lines */}
      <line x1={-hw} y1={depth/2} x2={0} y2={hh+depth/2} stroke={stroke} strokeWidth="0.3" opacity="0.25"/>
      <line x1={hw}  y1={depth/2} x2={0} y2={hh+depth/2} stroke={stroke} strokeWidth="0.3" opacity="0.25"/>
      {/* Index label — upper-left quadrant of top face, matching reference */}
      <text x={-hw*0.38} y={-hh*0.22} textAnchor="middle" fontSize="11" fontFamily="'Share Tech Mono',monospace"
        fill={stroke} opacity={isTarget||isDone?1:0.72} letterSpacing="0.05em">
        [{index}]
      </text>
    </g>
  );
}

        <line key={x} x1={x} y1="0" x2={x} y2="380" stroke="#00e5ff" strokeWidth="0.5" opacity="0.04"/>
      ))}
      {/* Horizontal scan */}
      <line x1="0" y1="195" x2="620" y2="195" stroke="#00e5ff" strokeWidth="0.4" opacity="0.05"/>
      {/* Corner circuit nodes */}
      <circle cx="60"  cy="60"  r="3" fill="#00e5ff" opacity="0.08"/>
      <circle cx="560" cy="60"  r="3" fill="#00e5ff" opacity="0.08"/>
      <circle cx="60"  cy="320" r="3" fill="#00e5ff" opacity="0.08"/>
      <circle cx="560" cy="320" r="3" fill="#00e5ff" opacity="0.08"/>
      {/* Static data particles */}
      {[52,138,219,344,448,548,578,486,386,282,96,192,302,406,512,66,158,562,438,314,74,198,522,365,444].map((x,i)=>(
        <circle key={i} cx={x} cy={[42,28,80,42,62,30,100,128,16,110,155,55,78,44,102,138,172,124,84,150,188,175,165,192,182][i]} r={i%3===0?1.4:0.9} fill="#00e5ff" opacity={i%4===0?0.3:0.18}/>
      ))}
    </g>
  );
}

// ─── Dungeon Field (right pane) ────────────────────────────────────────────
function DungeonField({ phase }) {
  const isExecuting = phase === 'executing';
  const isPlaced    = phase === 'placed' || phase === 'victory';
  const showArrow   = phase === 'idle' || phase === 'error';

  const coreClass = isExecuting ? 'core-moving'
                  : isPlaced    ? 'core-placed'
                  : 'core-floating';

  return (
    <svg viewBox="0 0 620 380" style={{width:'100%',height:'100%',display:'block'}} preserveAspectRatio="xMidYMid meet">
      <DataStreamBg/>

      {/* Tiles + contents in painter's order (back→front) */}
      {PAINT_ORDER.map(idx => {
        const cell = GRID_DEF[idx];
        const {cx,cy} = isoXY(cell.row, cell.col);
        const isActive = idx === 0;  // Arthur's cell
        const isTarget = idx === 1;  // target cell
        const isDone   = isTarget && isPlaced;
        return (
          <g key={idx}>
            <g transform={`translate(${cx},${cy})`} filter="url(#tileGlow)">
              <SvgIsoTile index={idx} isActive={isActive} isTarget={isTarget&&showArrow} isDone={isDone}/>
            </g>
            {/* Target arrow on cell[1] before data is placed */}
            {idx===1 && showArrow && (
              <g transform={`translate(${cx},${cy-30})`}>
                <SvgTargetArrow/>
              </g>
            )}
          </g>
        );
      })}

      {/* Arthur — rendered above all tiles so he's always visible */}
      {(() => {
        const cell0 = GRID_DEF[0];
        const {cx, cy} = isoXY(cell0.row, cell0.col);
        return (
          <g transform={`translate(${cx+2},${cy+8}) scale(1.1)`}>
            <SvgArthur/>
          </g>
        );
      })()}

      {/* Data Core — animated separately so it renders above tiles */}
      <g className={coreClass} filter="url(#coreGlow)">
        <SvgDataCore/>
      </g>

      {/* HUD label */}
      <rect x="8" y="6" width="210" height="24" rx="3" fill="rgba(0,0,0,0.65)" stroke="#00e5ff" strokeWidth="0.7" opacity="0.8"/>
      <text x="19" y="22" fontSize="11" fontFamily="'Orbitron',monospace" fill="#00e5ff" opacity="0.9" letterSpacing="0.12em">ARRAY PLAINS · LVL 1</text>

      {/* Arthur HP badge above char */}
      <g transform={`translate(${ISO.ox+8}, ${ISO.oy-28})`} opacity="0.9">
        <rect x="-26" y="-14" width="52" height="13" rx="2" fill="rgba(0,0,0,0.7)" stroke="#00ff88" strokeWidth="0.8"/>
        <rect x="-24" y="-12" width="48" height="9" rx="1" fill="#001a0a"/>
        <rect x="-24" y="-12" width="36" height="9" rx="1" fill="#00ff88" opacity="0.65"/>
        <text x="0" y="-5" textAnchor="middle" fontSize="6" fontFamily="'Share Tech Mono',monospace" fill="#00ff88" letterSpacing="0.1em">ARTHUR</text>
      </g>
    </svg>
  );
}

// ─── Narrative Panel ────────────────────────────────────────────────────────
function NarrativePanel({ heroHP, heroMaxHP, levelData }) {
  const hpPct   = (heroHP / heroMaxHP) * 100;
  const hpColor = heroHP > 60 ? '#00ff88' : heroHP > 30 ? '#ffcc00' : '#ff2244';
  const lv = levelData || ZONE1_LEVELS[0];
  const bossColor = lv.isBoss ? '#ff2244' : '#00e5ff';
  return (
    <div style={{padding:'20px 24px 16px',borderBottom:'1px solid rgba(0,229,255,0.1)',background:'rgba(5,8,15,0.5)'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
        <div style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:15,color:bossColor,letterSpacing:'0.1em',textShadow:`0 0 8px ${bossColor}88`}}>
          {lv.isBoss ? '⚠ BOSS: ' : `LEVEL 1-${lv.num}: `}{lv.title.toUpperCase()}
        </div>
        <div style={{fontSize:10,color:'rgba(0,229,255,0.5)',background:'rgba(0,229,255,0.07)',border:'1px solid rgba(0,229,255,0.2)',padding:'3px 12px',borderRadius:2,fontFamily:"'Share Tech Mono',monospace",flexShrink:0}}>
          {lv.num} of 6
        </div>
      </div>
      <div style={{fontSize:12,color:'rgba(255,255,255,0.5)',lineHeight:1.6,marginBottom:8}}>
        <span style={{color:lv.isBoss?'#ff4466':'#ff9900'}}>{lv.hook}</span>
      </div>
      <div style={{fontSize:13,color:'rgba(255,255,255,0.75)',lineHeight:1.8,marginBottom:14}}>
        {lv.narrative}
      </div>
      <div style={{fontSize:10,color:'rgba(0,229,255,0.55)',letterSpacing:'0.18em',marginBottom:7}}>HEALTH MATRIX</div>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div style={{flex:1,height:9,background:'#060e18',border:'1px solid rgba(0,229,255,0.18)',borderRadius:2,overflow:'hidden'}}>
          <div style={{width:`${hpPct}%`,height:'100%',background:`linear-gradient(90deg,${hpColor}cc,${hpColor})`,borderRadius:2,transition:'width 0.8s ease',boxShadow:`0 0 8px ${hpColor}88`}} className={heroHP>(heroMaxHP-10)?'hp-gain':''}/>
        </div>
        <div style={{fontSize:12,color:hpColor,fontFamily:"'Orbitron',monospace",fontWeight:700,whiteSpace:'nowrap'}}>
          {heroHP} <span style={{fontSize:9,opacity:0.6}}>/ {heroMaxHP}</span> <span style={{fontSize:11}}>♥</span>
        </div>
      </div>
    </div>
  );
}

// ─── Memory Interface (code editor) ────────────────────────────────────────
function MemoryInterface({ input, setInput, phase, errMsg, onExecute, inputRef, levelData }) {
  const isRunning = phase === 'executing';
  const isDone    = phase === 'victory' || phase === 'placed';
  const isError   = phase === 'error';
  const lv = levelData || ZONE1_LEVELS[0];
  const answerIdx = parseInt(lv.answer, 10);

  return (
    <div style={{display:'flex',flexDirection:'column',flex:1,background:'#03070e',minHeight:0}}>
      {/* Header */}
      <div style={{padding:'10px 24px',borderBottom:'1px solid rgba(0,229,255,0.1)',background:'rgba(0,229,255,0.03)',display:'flex',alignItems:'center',gap:10,flexShrink:0}}>
        <div style={{width:8,height:8,background:'#00e5ff',borderRadius:'50%',boxShadow:'0 0 6px #00e5ff'}}/>
        <span style={{fontSize:12,color:'#00e5ff',letterSpacing:'0.2em',fontFamily:"'Orbitron',monospace"}}>MEMORY INTERFACE</span>
      </div>

      {/* Memory state display */}
      <div style={{padding:'14px 24px',fontFamily:"'Share Tech Mono',monospace",fontSize:13,lineHeight:2.1,flex:1,overflowY:'auto'}}>
        <div style={{color:'rgba(0,229,255,0.4)',marginBottom:2}}>#memory {'{'}</div>
        {lv.memLabels.map((label,i) => {
          const isTarget = i === answerIdx;
          const isDanger = label.startsWith('⚠');
          const isEmpty  = label === '[ empty ]' || label === 'null';
          return (
            <div key={i} style={{paddingLeft:20,display:'flex',gap:8}}>
              <span style={{color:isDanger?'#ff4466':isTarget?'#ffcc00':'rgba(0,229,255,0.3)'}}>[{i}]</span>
              <span style={{color:'rgba(255,255,255,0.2)'}}>→</span>
              <span style={{color:isDanger?'#ff2244':isTarget?'#ffcc00':isEmpty?'rgba(0,229,255,0.45)':'rgba(255,255,255,0.35)'}}>{label}</span>
              {i<5 && <span style={{color:'rgba(0,229,255,0.2)'}}>,</span>}
            </div>
          );
        })}
        <div style={{color:'rgba(0,229,255,0.35)'}}>{'}'}</div>

        {/* Hint comment */}
        <div style={{marginTop:14,color:'rgba(0,229,255,0.28)',fontSize:11,lineHeight:1.7}}>
          {'// '}{lv.hook}
        </div>
      </div>

      {/* Code input section */}
      <div style={{padding:'14px 24px',borderTop:'1px solid rgba(0,229,255,0.1)',background:'rgba(0,0,0,0.35)',flexShrink:0}}>
        {/* Code line */}
        <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:14,display:'flex',alignItems:'center',flexWrap:'wrap',gap:2,marginBottom:8}}>
          <span style={{color:'rgba(255,255,255,0.2)',marginRight:6}}>&gt;</span>
          <span className="code-ghost">{lv.codePrefix}</span>
          <input
            ref={inputRef}
            type="text"
            value={input}
            onChange={e=>setInput(e.target.value.replace(/[^0-9]/g,'').slice(0,1))}
            onKeyDown={e=>e.key==='Enter'&&!isRunning&&!isDone&&onExecute()}
            maxLength={1} placeholder="_"
            disabled={isRunning||isDone}
            className={isError?'input-shake':''}
            style={{width:30,background:'transparent',border:'none',borderBottom:`2px solid ${isError?'#ff2244':'#00e5ff'}`,color:isError?'#ff2244':'#00ff88',fontSize:14,fontFamily:"'Share Tech Mono',monospace",textAlign:'center',outline:'none',padding:'0 2px',transition:'border-color 0.2s,color 0.2s'}}
          />
          <span className="code-ghost">{lv.codeSuffix}</span>
        </div>
        {/* Error */}
        <div style={{height:14,marginBottom:10,fontFamily:"'Share Tech Mono',monospace",fontSize:10,color:'#ff4466',letterSpacing:'0.08em',opacity:isError?1:0,transition:'opacity 0.2s'}}>
          ⚠ {errMsg||' '}
        </div>
        {/* Execute */}
        <button className="exec-btn" onClick={onExecute} disabled={isRunning||isDone}>
          {isRunning ? '⟳  EXECUTING…' : isDone ? '✓  CORE TRANSFERRED' : '▶  EXECUTE COMMAND'}
        </button>
      </div>
    </div>
  );
}

// ─── Victory Overlay ───────────────────────────────────────────────────────
function VictoryOverlay({ hpGained, newHP, onContinue }) {
  return (
    <div style={{position:'absolute',inset:0,background:'rgba(5,8,15,0.78)',backdropFilter:'blur(6px)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:50}}>
      <div className="victory-popup" style={{background:'#0a0d1a',border:'2px solid #00ff88',boxShadow:'0 0 40px rgba(0,255,136,0.4),0 0 80px rgba(0,255,136,0.15)',padding:'40px 48px',textAlign:'center',borderRadius:4,position:'relative',maxWidth:360}}>
        <div className="corner corner-tl" style={{borderColor:'#00ff88'}}/><div className="corner corner-tr" style={{borderColor:'#00ff88'}}/>
        <div className="corner corner-bl" style={{borderColor:'#00ff88'}}/><div className="corner corner-br" style={{borderColor:'#00ff88'}}/>
        <div style={{fontSize:44,marginBottom:10,filter:'drop-shadow(0 0 12px #00ff88)'}}>✓</div>
        <div style={{fontFamily:"'Orbitron',monospace",fontWeight:900,fontSize:20,color:'#00ff88',letterSpacing:'0.15em',textShadow:'0 0 14px rgba(0,255,136,0.7)',marginBottom:5}}>LEVEL COMPLETE</div>
        <div style={{fontFamily:"'Orbitron',monospace",fontSize:11,color:'rgba(0,255,136,0.6)',letterSpacing:'0.18em',marginBottom:22}}>ARRAY ASSIGNMENT — CLEARED</div>
        <div style={{background:'rgba(0,255,136,0.06)',border:'1px solid rgba(0,255,136,0.2)',padding:'14px 20px',borderRadius:3,marginBottom:22}}>
          <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:12,color:'rgba(255,255,255,0.6)',lineHeight:2}}>
            <div><span style={{color:'#00ff88'}}>+{hpGained} HP</span> restored</div>
            <div><span style={{color:'#00e5ff'}}>+25 XP</span> earned</div>
            <div style={{color:'rgba(255,255,255,0.3)',marginTop:4}}>Health: {newHP} / 100</div>
          </div>
        </div>
        <button className="btn btn-green" onClick={onContinue} style={{fontSize:12,padding:'11px 32px'}}>CONTINUE →</button>
      </div>
    </div>
  );
}

// ─── Level Screen (handles all Zone 1 levels) ──────────────────────────────
function Level1Screen({ saveData, setSaveData, onBack, levelData }) {
  const lv = levelData || ZONE1_LEVELS[0];
  const [input,  setInput]  = useState('');
  const [phase,  setPhase]  = useState('idle');
  const [errMsg, setErrMsg] = useState('');
  const inputRef = useRef(null);

  const heroHP    = saveData?.heroHP    ?? 75;
  const heroMaxHP = saveData?.heroMaxHP ?? 100;

  useEffect(() => { inputRef.current?.focus(); }, [lv.num]);

  // executing → placed
  useEffect(() => {
    if (phase !== 'executing') return;
    const t = setTimeout(() => setPhase('placed'), 950);
    return () => clearTimeout(t);
  }, [phase]);

  // placed → victory + save
  useEffect(() => {
    if (phase !== 'placed') return;
    const t = setTimeout(() => {
      const newHP   = Math.min(heroHP + lv.hpReward, heroMaxHP);
      const newLevel = Math.max(saveData?.level ?? 1, lv.num + 1);
      const newSave = { ...saveData, heroHP: newHP, level: newLevel };
      localStorage.setItem('dsa-dungeon-save', JSON.stringify(newSave));
      setSaveData(newSave);
      setPhase('victory');
    }, 700);
    return () => clearTimeout(t);
  }, [phase]);

  const handleExecute = () => {
    if (phase === 'executing' || phase === 'placed' || phase === 'victory') return;
    const val = input.trim();
    if (val === lv.answer) {
      setPhase('executing');
    } else if (val === '') {
      setErrMsg('INDEX REQUIRED — enter the target memory address');
      setPhase('error');
      setTimeout(() => setPhase('idle'), 700);
    } else {
      setErrMsg(`[${val}] — INVALID TARGET / OPERATION ABORTED`);
      setPhase('error');
      setTimeout(() => setPhase('idle'), 700);
    }
  };

  const bossColor = lv.isBoss ? '#ff2244' : '#00e5ff';

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100vh',background:'#05080f',position:'relative',overflow:'hidden'}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 20px',height:44,borderBottom:`1px solid ${bossColor}33`,background:'rgba(3,8,20,0.97)',flexShrink:0}}>
        <button onClick={onBack} style={{background:'transparent',border:'1px solid rgba(0,229,255,0.25)',color:'rgba(0,229,255,0.6)',fontFamily:"'Share Tech Mono',monospace",fontSize:11,padding:'5px 14px',cursor:'pointer',letterSpacing:'0.1em',transition:'all 0.15s'}}
          onMouseOver={e=>{e.currentTarget.style.color='#00e5ff';e.currentTarget.style.borderColor='rgba(0,229,255,0.6)';e.currentTarget.style.boxShadow='0 0 8px rgba(0,229,255,0.3)';}}
          onMouseOut={e=>{e.currentTarget.style.color='rgba(0,229,255,0.6)';e.currentTarget.style.borderColor='rgba(0,229,255,0.25)';e.currentTarget.style.boxShadow='none';}}>
          ← LEVELS
        </button>
        <div style={{textAlign:'center'}}>
          <span style={{fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:14,color:bossColor,letterSpacing:'0.2em',textShadow:`0 0 10px ${bossColor}88`}}>
            {lv.isBoss ? '⚠ BOSS BATTLE' : `ARRAY PLAINS · LVL ${lv.num}`}
          </span>
        </div>
        <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:11,color:'rgba(0,229,255,0.4)'}}>
          <span style={{background:'rgba(0,229,255,0.08)',border:'1px solid rgba(0,229,255,0.2)',padding:'3px 10px',borderRadius:2}}>Zone 1 · {lv.num}/6</span>
        </div>
      </div>

      {/* Split pane */}
      <div style={{display:'flex',flex:1,overflow:'hidden'}}>
        {/* LEFT: Narrative + Code (~42%) */}
        <div style={{width:'42%',borderRight:'1px solid rgba(0,229,255,0.1)',display:'flex',flexDirection:'column',minWidth:0}}>
          <NarrativePanel heroHP={saveData?.heroHP??75} heroMaxHP={saveData?.heroMaxHP??100} levelData={lv}/>
          <MemoryInterface input={input} setInput={setInput} phase={phase} errMsg={errMsg} onExecute={handleExecute} inputRef={inputRef} levelData={lv}/>
        </div>
        {/* RIGHT: Dungeon Field (~58%) */}
        <div style={{flex:1,background:'#030810',minWidth:0}}>
          <DungeonField phase={phase}/>
        </div>
      </div>

      {phase==='victory' && (
        <VictoryOverlay hpGained={lv.hpReward} newHP={Math.min((saveData?.heroHP??75)+lv.hpReward,100)} onContinue={onBack}/>
      )}
    </div>
  );
}

// ─── App ───────────────────────────────────────────────────────────────────
function App() {
  const [screen,    setScreen]    = useState('start');
  const [saveData,  setSaveData]  = useState(null);
  const [modal,     setModal]     = useState(null);
  const [levelData, setLevelData] = useState(null);

  useEffect(() => {
    try { const r=localStorage.getItem('dsa-dungeon-save'); if(r) setSaveData(JSON.parse(r)); } catch {}
  }, []);

  const startNew = () => {
    const save={zone:1,level:1,heroHP:75,heroMaxHP:100,started:Date.now()};
    localStorage.setItem('dsa-dungeon-save',JSON.stringify(save));
    setSaveData(save); setScreen('map');
  };

  const enterZone = (zone) => {
    setModal(null);
    if (zone.id===1) setScreen('levelSelect');
    else alert(`${zone.name} coming soon!`);
  };

  const startLevel = (lv) => {
    setLevelData(lv);
    setScreen('level');
  };

  return (
    <div>
      {screen==='start'       && <StartScreen hasSave={!!saveData} onNewGame={startNew} onContinue={()=>setScreen('map')}/>}
      {screen==='map'         && <WorldMap saveData={saveData} onZoneSelect={setModal} onBack={()=>setScreen('start')}/>}
      {screen==='levelSelect' && <LevelSelectScreen saveData={saveData} onLevelSelect={startLevel} onBack={()=>setScreen('map')}/>}
      {screen==='level'       && <Level1Screen saveData={saveData} setSaveData={setSaveData} onBack={()=>setScreen('levelSelect')} levelData={levelData}/>}
      {modal                  && <ZoneModal zone={modal} onEnter={enterZone} onClose={()=>setModal(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
